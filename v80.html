<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <title>vrxAI V80</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;500;600;700&display=swap');
        :root {--bg:#000;--bg2:#0a0a0a;--surface:rgba(28,28,30,0.8);--border:rgba(84,84,88,0.3);--text:#FFF;--text2:rgba(235,235,245,0.6);--blue:#0A84FF;--green:#30D158;--red:#FF453A;--purple:#BF5AF2;--orange:#FF9F0A;--safe:env(safe-area-inset-bottom)}
        [data-theme="light"]{--bg:#f2f2f7;--bg2:#fff;--surface:rgba(255,255,255,0.8);--border:rgba(60,60,67,0.2);--text:#000;--text2:rgba(60,60,67,0.6)}
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        html,body{height:100%;overflow:hidden}
        body{font-family:'SF Pro Display',-apple-system,sans-serif;background:var(--bg);height:100dvh;padding:8px;display:flex;align-items:center;justify-content:center}
        body::before{content:'';position:fixed;inset:0;background:radial-gradient(circle at 20% 30%,rgba(10,132,255,0.15) 0%,transparent 50%),radial-gradient(circle at 80% 70%,rgba(191,90,242,0.12) 0%,transparent 50%);z-index:0}
        #app{width:100%;max-width:430px;height:100%;max-height:932px;background:var(--bg2);border:1px solid var(--border);border-radius:54px;backdrop-filter:blur(60px) saturate(180%);-webkit-backdrop-filter:blur(60px) saturate(180%);box-shadow:0 0 0 1px rgba(255,255,255,0.08),0 30px 60px rgba(0,0,0,0.6);overflow:hidden;display:flex;flex-direction:column;position:relative;z-index:1}
        #app::before{content:'';position:absolute;top:11px;left:50%;transform:translateX(-50%);width:126px;height:32px;background:#000;border-radius:20px;z-index:20;box-shadow:inset 0 0 0 2px rgba(255,255,255,0.1)}
      .island{margin:48px 10px 0;background:rgba(0,0,0,0.9);border-radius:32px;padding:7px 10px;display:flex;align-items:center;gap:5px;backdrop-filter:blur(80px);-webkit-backdrop-filter:blur(80px);z-index:10;border:1px solid rgba(255,255,255,0.08)}
        [data-theme="light"].island{background:rgba(255,255,255,0.9);border:1px solid rgba(0,0,0,0.08)}
      .dot{width:7px;height:7px;background:var(--green);border-radius:50%;box-shadow:0 0 16px var(--green);animation:pulse 2s infinite}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
      .island-title{flex:1;font-size:13px;font-weight:600;color:var(--text)}
      .island-btn{background:transparent;border:none;color:var(--text);font-size:15px;cursor:pointer;padding:2px 3px;opacity:.7}
      .island-btn:active{transform:scale(.9);opacity:1}
      .sidebar{position:absolute;top:0;left:-300px;width:300px;height:100%;background:var(--bg2);border-right:1px solid var(--border);z-index:30;transition:.3s;padding:60px 14px;overflow-y:auto}
      .sidebar.open{left:0}
      .sidebar h3{color:var(--text);margin-bottom:10px;font-size:17px}
      .setting-group{margin-bottom:20px}
      .setting-label{font-size:12px;color:var(--text2);margin-bottom:6px;display:block}
      .setting-input{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:10px;border-radius:12px;font-size:13px;font-family:inherit}
      .setting-btn{width:100%;background:var(--blue);border:none;color:#fff;padding:10px;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;margin-top:8px}
      .setting-btn:active{transform:scale(.98)}
      .setting-btn.green{background:var(--green);color:#000}
      .agent-select{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:8px;border-radius:12px;margin:10px 0;font-size:13px}
      .model-select{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:8px;border-radius:12px;margin:10px 0;font-size:13px}
      .status-box{background:var(--surface);border:1px solid var(--border);padding:10px;border-radius:12px;font-size:11px;color:var(--text2);margin-top:10px}
      .status-ok{color:var(--green)}
      .status-error{color:var(--red)}
        #chat{flex:1;overflow-y:auto;padding:14px 12px 10px;z-index:1;-webkit-overflow-scrolling:touch}
      .welcome{height:100%;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;text-align:center;padding:0 20px}
      .welcome-icon{width:80px;height:80px;background:linear-gradient(135deg,#0A84FF 0%,#BF5AF2 50%,#30D158 100%);border-radius:22px;display:flex;align-items:center;justify-content:center;font-size:38px;font-weight:700}
      .welcome h1{font-size:30px;font-weight:700;color:var(--text)}
      .welcome p{color:var(--text2);font-size:14px}
      .api-warning{background:rgba(255,69,58,0.15);border:1px solid var(--red);color:var(--red);padding:10px 12px;border-radius:12px;font-size:12px;margin:8px 0}
      .presets{display:flex;gap:4px;flex-wrap:wrap;justify-content:center;margin-top:5px}
      .preset{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:5px 9px;border-radius:11px;font-size:11px;cursor:pointer}
      .preset:active{transform:scale(.95);background:var(--blue);color:#fff}
      .msg{max-width:100%;margin:0 auto 12px;width:100%}
      .msg::after{content:"";display:table;clear:both}
      .user{float:right;background:linear-gradient(135deg,var(--blue) 0%,#0066CC 100%);padding:10px 14px;border-radius:17px;max-width:75%;font-size:14px;line-height:1.4;color:#FFF;word-wrap:break-word}
      .ai{float:left;background:var(--surface);backdrop-filter:blur(80px);-webkit-backdrop-filter:blur(80px);border:1px solid var(--border);padding:11px 13px;border-radius:17px;max-width:80%;font-size:14px;line-height:1.5;color:var(--text);word-wrap:break-word}
      .ai-label{font-size:10px;color:var(--text2);margin-bottom:4px;font-weight:500;display:flex;justify-content:space-between;align-items:center}
      .ai-actions{display:flex;gap:5px}
      .ai-btn{background:transparent;border:none;color:var(--blue);cursor:pointer;font-size:9px;font-weight:600}
      .ai code{background:rgba(118,118,128,0.2);padding:2px 4px;border-radius:3px;font-family:monospace;font-size:13px}
      .ai pre{background:rgba(0,0,0,0.4);padding:10px;border-radius:8px;overflow-x:auto;margin:8px 0;font-size:12px;position:relative}
      .code-header{display:flex;justify-content:space-between;align-items:center;background:rgba(255,255,255,0.05);padding:6px 10px;margin:-10px -10px 8px;border-radius:8px 8px 0 0;font-size:11px;color:var(--text2)}
      .code-actions{display:flex;gap:6px}
      .code-btn{background:var(--green);color:#000;padding:3px 8px;border-radius:6px;font-size:10px;border:none;cursor:pointer;font-weight:600}
      .code-btn.copy{background:var(--blue);color:#fff}
      .error-box{background:rgba(255,69,58,0.15);border:1px solid var(--red);color:var(--red);padding:10px;border-radius:10px;margin:8px 0;font-size:12px}
      .ai b{font-weight:600}.ai ul{margin:5px 0 5px 14px}.ai li{margin:2px 0}
      .input-area{padding:7px 10px calc(10px + var(--safe));background:linear-gradient(180deg,transparent 0%,var(--bg2) 100%);position:sticky;bottom:0;z-index:5}
      .input-wrap{display:flex;align-items:flex-end;gap:4px;max-width:100%;margin:0 auto}
      .input-bar{flex:1;background:var(--surface);backdrop-filter:blur(80px);-webkit-backdrop-filter:blur(80px);border:1px solid var(--border);border-radius:24px;padding:4px 9px;display:flex;align-items:center;gap:4px;min-height:38px}
      .input-bar:focus-within{border-color:var(--blue)}
        #input{flex:1;border:none;background:transparent;outline:none;font-size:15px;color:var(--text);font-family:inherit;resize:none;max-height:80px;padding:2px 0;line-height:1.4}
        #input::placeholder{color:var(--text2)}
        #send{width:30px;height:30px;background:linear-gradient(135deg,var(--blue) 0%,#0066CC 100%);border:none;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
        #send:active{transform:scale(0.88)}
        #send:disabled{background:rgba(118,118,128,0.3);cursor:not-allowed;opacity:0.4}
      .send-icon{width:0;height:0;border-left:6px solid white;border-top:3px solid transparent;border-bottom:3px solid transparent;margin-left:2px}
      .typing{display:flex;gap:4px;padding:5px 0}
      .typing dot{width:6px;height:6px;background:var(--text2);border-radius:50%;animation:typing 1.6s infinite}
      .typing dot:nth-child(2){animation-delay:0.2s}.typing dot:nth-child(3){animation-delay:0.4s}
        @keyframes typing{0%,60%,100%{transform:translateY(0);opacity:0.3}30%{transform:translateY(-8px);opacity:1}}
        #app::after{content:'';position:absolute;bottom:6px;left:50%;transform:translateX(-50%);width:134px;height:5px;background:var(--text2);opacity:.3;border-radius:10px;z-index:20}
      .footer{font-size:8px;color:var(--text2);text-align:center;padding:2px 0;display:flex;justify-content:space-between}
      .toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--border);padding:10px 16px;border-radius:16px;color:var(--text);font-size:13px;z-index:50;opacity:0;transition:.3s}
      .toast.show{opacity:1}
    </style>
</head>
<body>
    <div id="toast" class="toast"></div>
    <div id="app">
        <div class="sidebar" id="sidebar">
            <h3>⚙️ Settings V80</h3>
            <div class="setting-group">
                <label class="setting-label">Groq API Key</label>
                <input type="password" class="setting-input" id="apiKeyInput" placeholder="gsk_...">
                <button class="setting-btn" id="saveKeyBtn">Simpan Key</button>
            </div>
            <div class="setting-group">
                <button class="setting-btn green" id="testKeyBtn">Test API Key</button>
                <div class="status-box" id="keyStatus">Status: Belum di-test</div>
            </div>
            <div class="setting-group">
                <label class="setting-label">Agent Mode</label>
                <select class="agent-select" id="agentSelect">
                    <option value="default">General</option>
                    <option value="coder">Coder Pro</option>
                    <option value="writer">Writer</option>
                    <option value="analyst">Data Analyst</option>
                </select>
            </div>
            <div class="setting-group">
                <label class="setting-label">Model</label>
                <select class="model-select" id="modelSelect">
                    <option value="llama-3.3-70b-versatile">Llama 3.3 70B</option>
                    <option value="llama-3.1-8b-instant">Llama 3.1 8B Fast</option>
                    <option value="mixtral-8x7b-32768">Mixtral 8x7B</option>
                    <option value="gemma2-9b-it">Gemma2 9B</option>
                </select>
            </div>
            <div class="setting-group">
                <label class="setting-label">Dapetin API Key:</label>
                <button class="setting-btn" onclick="window.open('https://console.groq.com/keys','_blank')">Buka console.groq.com</button>
            </div>
        </div>
        <div class="island">
            <button class="island-btn" id="menuBtn">☰</button>
            <div class="dot"></div><span class="island-title">vrxAI V80</span>
            <button class="island-btn" id="themeBtn">🌙</button>
            <button class="island-btn" id="clearBtn">🗑️</button>
        </div>
        <div id="chat">
            <div class="welcome" id="welcome">
                <div class="welcome-icon">V</div>
                <h1>vrxAI V80</h1>
                <p>No Bug. Kirim Chat Dijamin Jalan.</p>
                <div class="api-warning" id="keyWarning">⚠️ API Key belum di-set. Buka ☰ → Settings → Paste key lu</div>
                <div class="presets">
                    <button class="preset" data-prompt="buatin web landing page kopi modern">Web Kopi</button>
                    <button class="preset" data-prompt="buatin bot telegram python">Bot Tele</button>
                    <button class="preset" data-prompt="jelasin quantum computing">Jelasin AI</button>
                    <button class="preset" data-prompt="kasih 5 ide startup 2026">Ide Startup</button>
                </div>
            </div>
        </div>
        <div class="input-area">
            <div class="input-wrap">
                <div class="input-bar">
                    <textarea id="input" placeholder="Tanya apa aja..." rows="1"></textarea>
                </div>
                <button id="sendBtn" disabled><div class="send-icon"></div></button>
            </div>
            <div class="footer"><span id="tokenText">Token: ~0</span><span id="statusText">Ready</span></div>
        </div>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const chat = document.getElementById('chat');
            const input = document.getElementById('input');
            const sendBtn = document.getElementById('sendBtn');
            const welcome = document.getElementById('welcome');
            const themeBtn = document.getElementById('themeBtn');
            const clearBtn = document.getElementById('clearBtn');
            const menuBtn = document.getElementById('menuBtn');
            const sidebar = document.getElementById('sidebar');
            const modelSelect = document.getElementById('modelSelect');
            const agentSelect = document.getElementById('agentSelect');
            const apiKeyInput = document.getElementById('apiKeyInput');
            const saveKeyBtn = document.getElementById('saveKeyBtn');
            const testKeyBtn = document.getElementById('testKeyBtn');
            const keyStatus = document.getElementById('keyStatus');
            const tokenText = document.getElementById('tokenText');
            const statusText = document.getElementById('statusText');
            const toast = document.getElementById('toast');
            const keyWarning = document.getElementById('keyWarning');
            
            let API_KEY, USER_NAME = 'xso', CURRENT_CHAT = 'Chat 1', CURRENT_MODEL = 'llama-3.3-70b-versatile', CURRENT_AGENT = 'default';
            let chats, history;
            
            const STORAGE = window.localStorage;
            const PROXY_URLS = [
                "https://api.groq.com/openai/v1/chat/completions",
                "https://corsproxy.io/?https://api.groq.com/openai/v1/chat/completions",
                "https://api.allorigins.win/raw?url=" + encodeURIComponent("https://api.groq.com/openai/v1/chat/completions")
            ];
            
            const AGENTS = {
                default: {name:'vrxAI',system:`Kamu vrxAI V80. User: ${USER_NAME}. Jawab lengkap, pake markdown. Gaya santai lu/gw 🔥`},
                coder: {name:'vrxAI Coder',system:`Kamu vrxAI Coder Pro. User: ${USER_NAME}. Kalo minta kode = langsung kasih LENGKAP + penjelasan. Format: \`\`\`html\n...\n\`\`\`.`},
                writer: {name:'vrxAI Writer',system:`Kamu vrxAI Writer. User: ${USER_NAME}. Bikin artikel/cerita engaging, hook kuat.`},
                analyst: {name:'vrxAI Analyst',system:`Kamu vrxAI Data Analyst. User: ${USER_NAME}. Analisis data, kasih tabel, insight.`}
            };
            
            function showToast(msg) {
                toast.textContent = msg;
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 3000);
            }
            
            // SIDEBAR TOGGLE - FIX
            menuBtn.onclick = () => {
                console.log('Sidebar toggle');
                sidebar.classList.toggle('open');
            };
            
            // INIT
            function init() {
                API_KEY = STORAGE.getItem('vrx_key_v80') || '';
                USER_NAME = STORAGE.getItem('vrx_name') || 'xso';
                CURRENT_CHAT = STORAGE.getItem('vrx_current_chat') || 'Chat 1';
                CURRENT_MODEL = STORAGE.getItem('vrx_model') || 'llama-3.3-70b-versatile';
                CURRENT_AGENT = STORAGE.getItem('vrx_agent') || 'default';
                
                apiKeyInput.value = API_KEY;
                modelSelect.value = CURRENT_MODEL;
                agentSelect.value = CURRENT_AGENT;
                
                if (API_KEY) {
                    keyWarning.style.display = 'none';
                    keyStatus.innerHTML = 'Status: <span class="status-ok">API Key tersimpan ✅</span>';
                } else {
                    keyStatus.innerHTML = 'Status: <span class="status-error">API Key kosong ❌</span>';
                }
                
                chats = JSON.parse(STORAGE.getItem('vrx_chats_v80') || '{}');
                if (!chats[CURRENT_CHAT]) {
                    chats[CURRENT_CHAT] = [{role:"system",content:AGENTS[CURRENT_AGENT].system}];
                }
                history = chats[CURRENT_CHAT];
                
                const savedTheme = STORAGE.getItem('vrx_theme') || 'dark';
                document.documentElement.setAttribute('data-theme', savedTheme);
                themeBtn.textContent = savedTheme === 'dark'? '☀️' : '🌙';
                
                loadChat();
                if (history.length <= 1) {
                    setTimeout(() => {
                        addAI(`Halo ${USER_NAME}! 🔥 V80 ready.\n\n**Setup dulu:**\n1. Buka ☰ → Settings\n2. Paste API Key dari console.groq.com/keys\n3. Klik "Simpan Key"\n4. Test kirim chat\n\nKalo udah ada key, langsung chat aja!`);
                    }, 300);
                }
            }
            
            themeBtn.onclick = () => {
                const t = document.documentElement.getAttribute('data-theme') === 'dark'? 'light' : 'dark';
                document.documentElement.setAttribute('data-theme', t);
                STORAGE.setItem('vrx_theme', t);
                themeBtn.textContent = t === 'dark'? '☀️' : '🌙';
            };
            
            clearBtn.onclick = () => {
                if (confirm('Hapus semua chat?')) {
                    history = [history[0]];
                    saveAll();
                    loadChat();
                }
            };
            
            saveKeyBtn.onclick = () => {
                const key = apiKeyInput.value.trim();
                if (key.startsWith('gsk_') && key.length > 40) {
                    STORAGE.setItem('vrx_key_v80', key);
                    API_KEY = key;
                    keyWarning.style.display = 'none';
                    keyStatus.innerHTML = 'Status: <span class="status-ok">API Key tersimpan ✅</span>';
                    showToast('✅ API Key tersimpan!');
                    sidebar.classList.remove('open');
                } else {
                    showToast('❌ Format salah. Harus gsk_...');
                }
            };
            
            testKeyBtn.onclick = async () => {
                if (!API_KEY) {
                    showToast('❌ Isi API Key dulu');
                    return;
                }
                
                testKeyBtn.disabled = true;
                testKeyBtn.textContent = 'Testing...';
                keyStatus.innerHTML = 'Status: Testing...';
                
                try {
                    const res = await fetch('https://api.groq.com/openai/v1/models', {
                        headers: {'Authorization': 'Bearer ' + API_KEY}
                    });
                    
                    if (res.ok) {
                        showToast('✅ API Key valid! Bisa kirim chat');
                        keyStatus.innerHTML = 'Status: <span class="status-ok">API Key valid ✅</span>';
                    } else {
                        showToast('❌ API Key in
